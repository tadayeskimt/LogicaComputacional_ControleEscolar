<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="container">
        <div class="box" id="box">

            <div class="form login">
                <h2>Entrar</h2>

                <form onsubmit="login(event)">
                    
                    <input type="email" id="loginEmail" placeholder="Email" required>

                    <div class="password-box">
                        <input type="password" id="loginPassword" placeholder="Senha" required>
                        <span class="toggle" onclick="togglePassword('loginPassword', this)">
                            <img src="https://iili.io/BUQiEQa.png">
                        </span>
                    </div>

                    <button type="submit" id="loginBtn">Entrar</button>
                </form>

                <p>Não tem conta?</p>
                <button class="switch" onclick="toggle()">Criar conta</button>
            </div>

            <div class="form register">
                <h2>Criar conta</h2>

                <form onsubmit="register(event)">
                    <input type="text" id="registerName" placeholder="Nome" required>
                    <input type="email" id="registerEmail" placeholder="Email" required>

                    <div class="password-box">
                        <input type="password" id="registerPassword" placeholder="Senha" required>
                        <span class="toggle" onclick="togglePassword('registerPassword', this)">
                            <img src="https://iili.io/BUQiEQa.png">
                        </span>
                    </div>

                    <div class="password-box">
                        <input type="password" id="registerPasswordConfirm" placeholder="Repetir senha" required>
                        <span class="toggle" onclick="togglePassword('registerPasswordConfirm', this)">
                            <img src="https://iili.io/BUQiEQa.png">
                        </span>
                    </div>

                    <button type="submit" id="registerBtn">Cadastrar</button>
                </form>

                <p>Já tem conta?</p>
                <button class="switch" onclick="toggle()">Entrar</button>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script>
        function toggle() {
            document.getElementById("box").classList.toggle("active");
        }

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            const img = el.querySelector("img");

            if (input.type === "password") {
                input.type = "text";
                img.src = "https://iili.io/BUQPFHP.png";
            } else {
                input.type = "password";
                img.src = "https://iili.io/BUQiEQa.png"; 
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/client.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
